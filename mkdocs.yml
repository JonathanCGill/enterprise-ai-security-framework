site_name: AI Runtime Behaviour Security
site_url: https://airuntimesecurity.co.za/
site_description: >-
  A practitioner's reference for runtime AI security — from single-model
  deployments to autonomous multi-agent orchestration.
site_author: Jonathan Gill

repo_url: https://github.com/JonathanCGill/ai-runtime-behaviour-security
repo_name: JonathanCGill/ai-runtime-behaviour-security
edit_uri: edit/main/

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: Roboto Mono
  palette:
    - scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.path
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - meta
  - sitemap:
      changefreq: weekly
      priority: 0.8

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra:
  analytics:
    provider: google
    property: G-LHJX43M3XE
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JonathanCGill
      name: Jonathan Gill on GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/jonathancgill/
      name: Jonathan Gill on LinkedIn

copyright: Copyright &copy; 2026 Jonathan Gill | MIT License

