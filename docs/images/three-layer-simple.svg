<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" role="img" aria-label="Defence-in-depth: three layers of runtime AI security">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <style>
    text { font-family: Inter, system-ui, sans-serif; }
    .title { font-size: 14px; font-weight: 700; fill: #fff; }
    .desc { font-size: 10.5px; fill: rgba(255,255,255,0.8); }
    .arrow-text { font-size: 9.5px; fill: #94a3b8; font-style: italic; }
    .input-text { font-size: 11px; fill: #64748b; font-weight: 600; }
  </style>

  <!-- Layer 3 — Human Oversight (top) -->
  <rect x="40" y="16" width="440" height="72" rx="10" fill="#1a1a2e"/>
  <text x="260" y="44" text-anchor="middle" class="title">Human Oversight</text>
  <text x="260" y="62" text-anchor="middle" class="desc">Escalation paths · audit trails · high-risk checkpoints</text>
  <text x="260" y="76" text-anchor="middle" class="desc">The backstop when automated layers miss</text>

  <!-- Arrow: Judge → Human -->
  <line x1="260" y1="108" x2="260" y2="88" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="275" y="103" class="arrow-text">escalates edge cases</text>

  <!-- Layer 2 — LLM-as-Judge (middle) -->
  <rect x="40" y="116" width="440" height="72" rx="10" fill="#0f3460"/>
  <text x="260" y="144" text-anchor="middle" class="title">LLM-as-Judge</text>
  <text x="260" y="162" text-anchor="middle" class="desc">Separate model evaluates outputs against policy and intent</text>
  <text x="260" y="176" text-anchor="middle" class="desc">Catches subtle, contextual failures</text>

  <!-- Arrow: Guardrails → Judge -->
  <line x1="260" y1="208" x2="260" y2="188" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="275" y="203" class="arrow-text">passes within-bounds outputs</text>

  <!-- Layer 1 — Guardrails (bottom) -->
  <rect x="40" y="216" width="440" height="72" rx="10" fill="#2a9d8f"/>
  <text x="260" y="244" text-anchor="middle" class="title">Guardrails</text>
  <text x="260" y="262" text-anchor="middle" class="desc">Content policies · scope constraints · tool-use permissions</text>
  <text x="260" y="276" text-anchor="middle" class="desc">Fast, deterministic — blocks known-bad patterns</text>

  <!-- Input arrow -->
  <line x1="260" y1="310" x2="260" y2="288" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="260" y="318" text-anchor="middle" class="input-text">AI model output enters here</text>
</svg>
