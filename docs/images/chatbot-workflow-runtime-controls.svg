<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="570" viewBox="0 0 760 570" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="760" height="570" fill="#ffffff"/>

  <!-- Title -->
  <text x="380" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Chatbot Personal Data Update</text>
  <text x="380" y="42" text-anchor="middle" font-size="11" fill="#64748b">Authenticated user · Risk-proportionate execution paths</text>

  <!-- User -->
  <rect x="290" y="56" width="180" height="30" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="380" y="75" text-anchor="middle" font-size="10.5" font-weight="600" fill="#334155">User (Authenticated)</text>
  <line x1="380" y1="86" x2="380" y2="100" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Chatbot UI -->
  <rect x="280" y="100" width="200" height="28" rx="5" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1"/>
  <text x="380" y="118" text-anchor="middle" font-size="10" font-weight="500" fill="#0c4a6e">Chatbot Interface</text>
  <line x1="380" y1="128" x2="380" y2="142" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- API Gateway -->
  <rect x="270" y="142" width="220" height="28" rx="5" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="380" y="160" text-anchor="middle" font-size="10" font-weight="500" fill="#9a3412">API Gateway (session validated)</text>
  <line x1="380" y1="170" x2="380" y2="194" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ AI RUNTIME SECURITY BOUNDARY ═══ -->
  <rect x="50" y="186" width="660" height="210" rx="8" fill="rgba(124,58,237,0.03)" stroke="#7c3aed" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="380" y="202" text-anchor="middle" font-size="9.5" font-weight="700" fill="#7c3aed" letter-spacing="1.5">AI RUNTIME SECURITY BOUNDARY</text>

  <!-- Guardrail -->
  <rect x="240" y="210" width="280" height="26" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="380" y="227" text-anchor="middle" font-size="10" font-weight="500" fill="#991b1b">Input Guardrail (policy, injection filter)</text>
  <line x1="380" y1="236" x2="380" y2="250" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Classifier -->
  <rect x="245" y="250" width="270" height="34" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="380" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Intent &amp; Risk Classifier</text>
  <text x="380" y="277" text-anchor="middle" font-size="9" fill="#3b82f6">Claude Haiku 4.5</text>

  <!-- Split arrows -->
  <line x1="312" y1="284" x2="220" y2="312" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="245" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">Low risk</text>

  <line x1="448" y1="284" x2="540" y2="312" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="515" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">High risk</text>

  <!-- LOW RISK: Execution Agent -->
  <text x="195" y="322" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">e.g. update nickname</text>
  <rect x="110" y="328" width="170" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="195" y="343" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Execution Agent</text>
  <text x="195" y="355" text-anchor="middle" font-size="9" fill="#22c55e">GPT-4o mini</text>

  <!-- HIGH RISK: Judge -->
  <text x="565" y="322" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">e.g. change address</text>
  <rect x="470" y="328" width="190" height="34" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="565" y="343" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Judge (risk evaluation)</text>
  <text x="565" y="355" text-anchor="middle" font-size="9" fill="#7c3aed">Claude Sonnet 4.6</text>

  <!-- Low risk path exits boundary -->
  <line x1="195" y1="362" x2="195" y2="396" stroke="#16a34a" stroke-width="1.5"/>

  <!-- High risk path exits boundary -->
  <line x1="565" y1="362" x2="565" y2="396" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- ═══ END AI BOUNDARY ═══ -->

  <!-- Arrow from Judge path to Human Analyst -->
  <line x1="565" y1="396" x2="565" y2="416" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="592" y="410" text-anchor="start" font-size="8" fill="#7c3aed" font-style="italic">recommends</text>

  <!-- Human Analyst -->
  <rect x="475" y="416" width="180" height="34" rx="5" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="565" y="431" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412">Human Analyst</text>
  <text x="565" y="443" text-anchor="middle" font-size="9" fill="#b45309">Approve / Reject</text>

  <!-- Reject path -->
  <line x1="655" y1="433" x2="690" y2="433" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-r)"/>
  <text x="698" y="429" text-anchor="start" font-size="8" font-weight="500" fill="#dc2626">Reject</text>
  <text x="698" y="440" text-anchor="start" font-size="8" fill="#64748b">Notify user</text>

  <!-- Approve path down -->
  <line x1="565" y1="450" x2="565" y2="478" stroke="#16a34a" stroke-width="1.5"/>
  <text x="592" y="468" text-anchor="start" font-size="8" fill="#16a34a" font-style="italic">approve</text>

  <!-- Low risk path continues down to merge -->
  <line x1="195" y1="396" x2="195" y2="478" stroke="#16a34a" stroke-width="1.5"/>

  <!-- Horizontal merge lines -->
  <line x1="195" y1="478" x2="310" y2="478" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="565" y1="478" x2="450" y2="478" stroke="#16a34a" stroke-width="1.5"/>

  <!-- Arrow into DB -->
  <line x1="380" y1="478" x2="380" y2="492" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Database -->
  <ellipse cx="380" cy="500" rx="85" ry="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <rect x="295" y="500" width="170" height="22" fill="#f1f5f9" stroke-width="0"/>
  <line x1="295" y1="500" x2="295" y2="522" stroke="#94a3b8" stroke-width="1"/>
  <line x1="465" y1="500" x2="465" y2="522" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="380" cy="522" rx="85" ry="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="380" y="515" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Customer Database</text>

  <!-- Arrow DB → Committed -->
  <line x1="380" y1="530" x2="380" y2="544" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Action Committed -->
  <rect x="300" y="544" width="160" height="22" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="380" y="559" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Action Committed</text>
</svg>
