{% extends "base.html" %}

{% block extrahead %}
{{ super() }}
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BNXDE3EJ7E"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-BNXDE3EJ7E');
</script>
<!-- JSON-LD structured data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "name": "{{ config.site_name }}",
      "url": "{{ config.site_url }}",
      "description": "{{ config.site_description }}",
      "author": {
        "@type": "Person",
        "name": "{{ config.site_author }}",
        "url": "https://www.linkedin.com/in/jonathancgill/",
        "sameAs": [
          "https://github.com/JonathanCGill",
          "https://www.linkedin.com/in/jonathancgill/"
        ]
      },
      "publisher": {
        "@type": "Person",
        "name": "{{ config.site_author }}"
      },
      "inLanguage": "en",
      "license": "https://opensource.org/licenses/MIT"
    },
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ config.site_url }}"
        }{% if page and page.parent %},
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ page.parent.title }}",
          "item": "{{ config.site_url }}{{ page.parent.url }}"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "{{ page.title }}"
        }{% elif page and page.title != config.site_name %},
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ page.title }}"
        }{% endif %}
      ]
    }
  ]
}
</script>
{% if page and page.meta %}
  <!-- Open Graph / LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ page.meta.get('og_title', page.meta.get('title', page.title)) }}" />
  <meta property="og:description" content="{{ page.meta.get('og_description', config.site_description) }}" />
  <meta property="og:url" content="{{ page.canonical_url }}" />
  <meta property="og:site_name" content="{{ config.site_name }}" />
  <meta property="og:image" content="{{ config.site_url }}images/architecture-overview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="867" />
  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ page.meta.get('og_title', page.meta.get('title', page.title)) }}" />
  <meta name="twitter:description" content="{{ page.meta.get('og_description', config.site_description) }}" />
  <meta name="twitter:image" content="{{ config.site_url }}images/architecture-overview.png" />
{% else %}
  <!-- Fallback OG tags (e.g. 404 page) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ config.site_name }}" />
  <meta property="og:description" content="{{ config.site_description }}" />
  <meta property="og:site_name" content="{{ config.site_name }}" />
  <meta property="og:image" content="{{ config.site_url }}images/architecture-overview.png" />
{% endif %}
{% endblock %}
