### MkDocs config for MASO PDF generation
### Usage: mkdocs build -f mkdocs-pdf.yml
### Output: site-pdf/pdf/MASO-Framework.pdf

site_name: "MASO Framework — AI Runtime Security"
site_url: https://airuntimesecurity.io/
site_description: >-
  Multi-Agent Security Operations (MASO) — A PACE-driven framework
  for securing multi-model agent orchestration at runtime.
site_author: Jonathan Gill

docs_dir: docs
site_dir: site-pdf

theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: Roboto Mono
  palette:
    - scheme: default
      primary: custom
      accent: indigo

plugins:
  - search
  - with-pdf:
      author: Jonathan Gill
      copyright: "Copyright © 2026 Jonathan Gill | MIT License"
      cover: true
      cover_title: "MASO Framework"
      cover_subtitle: >-
        Multi-Agent Security Operations —
        A PACE-Driven Approach to Securing
        Multi-Model Agent Orchestration
      output_path: pdf/MASO-Framework.pdf
      toc_title: "Table of Contents"
      heading_shift: true
      toc_level: 3
      ordered_chapter_level: 2

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

nav:
  - Overview: maso/README.md
  - Controls:
    - Prompt, Goal & Epistemic Integrity: maso/controls/prompt-goal-and-epistemic-integrity.md
    - Identity & Access: maso/controls/identity-and-access.md
    - Data Protection: maso/controls/data-protection.md
    - Execution Control: maso/controls/execution-control.md
    - Observability: maso/controls/observability.md
    - Supply Chain: maso/controls/supply-chain.md
    - Privileged Agent Governance: maso/controls/privileged-agent-governance.md
    - Emergent Risk Register: maso/controls/risk-register.md
  - Implementation:
    - Tier 1 - Supervised: maso/implementation/tier-1-supervised.md
    - Tier 2 - Managed: maso/implementation/tier-2-managed.md
    - Tier 3 - Autonomous: maso/implementation/tier-3-autonomous.md
  - Threat Intelligence:
    - Incident Tracker: maso/threat-intelligence/incident-tracker.md
  - Red Team:
    - Red Team Playbook: maso/red-team/red-team-playbook.md
  - Integration:
    - Integration Guide: maso/integration/integration-guide.md
  - Examples:
    - Worked Examples: maso/examples/worked-examples.md
